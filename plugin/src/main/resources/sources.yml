# Inside this file is the configuration options
# for the data sources that ASP supports
sql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  username: slimeworldmanager
  password: ''
  database: slimeworldmanager
  usessl: false
  # MySQL: jdbc:mysql://{host}:{port}/{database}?autoReconnect=true&allowMultiQueries=true&useSSL={usessl}
  # MariaDB: jdbc:mariadb://{host}:{port}/{database}?autoReconnect=true&allowMultiQueries=true&useSSL={usessl}
  # PostgreSQL: jdbc:postgresql://{host}:{port}/{database}?ssl={usessl}
  # SQLite: jdbc:sqlite:filename.db
  # H2: jdbc:h2:./data/filename
  sqlUrl: 'jdbc:mysql://{host}:{port}/{database}?autoReconnect=true&allowMultiQueries=true&useSSL={usessl}'
mongodb:
  enabled: false
  host: 127.0.0.1
  port: 27017
  auth: admin
  username: slimeworldmanager
  password: ''
  database: slimeworldmanager
  collection: worlds
  uri: ''
file:
  path: slime_worlds
api:
  enabled: false
  ignoreSslCertificate: false
  username: ''
  token: ''
  url: ''